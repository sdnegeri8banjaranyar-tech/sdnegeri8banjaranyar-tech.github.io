<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD Negeri 8 Banjar Anyar</title>
    <!-- Path gambar diubah ke folder lokal -->
    <link class="rounded" rel="icon" href="images/logo_sekolah.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #d4edda 0%, #f8f9fa 100%); background-attachment: fixed; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: rgba(25, 135, 84, 0.95) !important; backdrop-filter: blur(10px); }
        .landing-hero { width: 100%; height: 75vh; object-fit: cover; border-bottom: 5px solid #198754; }
        .sidebar-box, .main-content { background: rgba(255, 255, 255, 0.7) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1); }
        .stat-card { text-align: center; padding: 15px; border-radius: 15px; background: #198754; color: white; margin-bottom: 20px; }
        footer { background: rgba(25, 135, 84, 0.9); color: white; padding: 30px 0; margin-top: 40px; backdrop-filter: blur(10px); }
        .banner-selayang { width: 100%; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .kepsek-img { width: 250px; height: 250px; object-fit: cover; border-radius: 20px; border: 5px solid rgba(255, 255, 255, 0.8); }
        .btn-glass { background: #198754; color: white; border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; }
        .btn-dapodik { background: #ffc107; color: #000; border-radius: 20px; font-weight: bold; padding: 8px 20px; text-decoration: none; transition: 0.3s; }
        .video-player-custom { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg shadow-sm sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand text-white fw-bold d-flex align-items-center" href="#">
                <img src="images/logo_sekolah.png" style="width:40px; margin-right:10px;">
                SD NEGERI 8 BANJAR ANYAR
            </a>
            <a href="https://sekolah.data.kemendikdasmen.go.id/profil-sekolah/60BABF14-31F5-E011-A498-A53FFFE1F824" target="_blank" class="btn-dapodik shadow-sm">🔍 Cek Profil Dapodik</a>
        </div>
    </nav>

    <!-- Banner Utama -->
    <div class="container-fluid px-0">
        <img src="images/banner_sekolah.webp" class="landing-hero">
    </div>

    <div class="container my-4">
        <div class="row">
            <div class="col-lg-8">
                <div class="main-content">
                    <img src="images/kepala_sekolah.webp" class="kepsek-img mb-3">
                    <h4>Sambutan Kepala Sekolah</h4>
                    <p>"Selamat datang di SD Negeri 8 Banjar Anyar..."</p>
                </div>
                
                <!-- Video Lingkungan -->
                <div class="main-content">
                    <video class="video-player-custom" autoplay loop muted playsinline controls>
                        <source src="video/video_lingkungan.webm" type="video/webm">
                    </video>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="row">
                    <div class="col-6"><div class="stat-card"><h3>416</h3>Siswa</div></div>
                    <div class="col-6"><div class="stat-card"><h3>22</h3>Guru</div></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
